<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mfer bash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: monospace; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #title {
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      margin-bottom: 8px;
    }
    #instructions {
      font-size: 16px;
      opacity: 0.8;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 24px;
      font-family: monospace;
      z-index: 20;
    }
    #reset-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 32px;
      font-size: 18px;
      font-family: monospace;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      display: none;
    }
    #reset-btn:hover { background: #ff6b81; }
    #level-select {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      gap: 4px;
    }
    .level-btn {
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 5px 12px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .level-btn.active { background: #e94560; border-color: #e94560; }
    .level-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
    #controls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      padding: 12px 16px;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      z-index: 10;
      min-width: 180px;
      backdrop-filter: blur(4px);
    }
    #controls h3 { margin: 0 0 8px; font-size: 13px; opacity: 0.6; }
    #controls label { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
    #controls label span { opacity: 0.8; }
    #controls input[type=range] { width: 90px; cursor: pointer; accent-color: #e94560; }
    #controls .val { width: 32px; text-align: right; font-size: 11px; opacity: 0.6; }
    #toggle-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      z-index: 11;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="title">mfer bash</div>
    <div id="instructions">click to drop</div>
    <div id="score" style="font-size: 48px; color: #e94560; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-top: 8px;"></div>
  </div>
  <div id="level-select">
    <button class="level-btn active" data-level="0">stairs</button>
    <button class="level-btn" data-level="1">truck hit</button>
  </div>
  <div id="loading">loading mfer...</div>
  <button id="toggle-controls">settings</button>
  <div id="controls" style="display:none;">
    <h3>physics</h3>
    <label><span>gravity</span><input type="range" id="sl-gravity" min="1" max="50" value="15" step="1"><span class="val" id="v-gravity">15</span></label>
    <label><span>launch speed</span><input type="range" id="sl-launch" min="0" max="10" value="2" step="0.5"><span class="val" id="v-launch">2</span></label>
    <label><span>spin</span><input type="range" id="sl-spin" min="0" max="15" value="6" step="0.5"><span class="val" id="v-spin">6</span></label>
    <label><span>bounce</span><input type="range" id="sl-bounce" min="0" max="1" value="0.3" step="0.05"><span class="val" id="v-bounce">0.3</span></label>
    <label><span>damping</span><input type="range" id="sl-damping" min="0" max="4" value="2" step="0.1"><span class="val" id="v-damping">2</span></label>
    <label><span>drop height</span><input type="range" id="sl-height" min="3" max="20" value="7" step="1"><span class="val" id="v-height">7</span></label>
    <button id="defaults-btn" style="margin-top:8px;width:100%;padding:4px;font-family:monospace;font-size:11px;background:#333;color:#fff;border:1px solid rgba(255,255,255,0.2);border-radius:4px;cursor:pointer;">defaults</button>
  </div>
  <button id="reset-btn">reset</button>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
