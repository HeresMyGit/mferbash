<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mfer bash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: monospace; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #title {
      font-size: 32px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      margin-bottom: 8px;
    }
    #instructions {
      font-size: 16px;
      opacity: 0.8;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 24px;
      font-family: monospace;
      z-index: 20;
    }
    #reset-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 32px;
      font-size: 18px;
      font-family: monospace;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      display: none;
    }
    #reset-btn:hover { background: #ff6b81; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="title">mfer bash</div>
    <div id="instructions">click to drop</div>
    <div id="score" style="font-size: 48px; color: #e94560; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-top: 8px;"></div>
  </div>
  <div id="loading">loading mfer...</div>
  <button id="reset-btn">reset</button>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
