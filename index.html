<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>mfer arcade</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y13VR5RYEP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Y13VR5RYEP');
  </script>
  <style>
    @font-face {
      font-family: 'SartoshiScript';
      src: url('/fonts/SartoshiScript-Regular.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0f14; font-family: monospace; color: #fff; }
    canvas { display: block; }

    body.menu-mode #score,
    body.menu-mode #ui,
    body.menu-mode #hud,
    body.menu-mode #controls,
    body.menu-mode .corner-btn,
    body.menu-mode #cam-hint,
    body.menu-mode #impact-captures {
      display: none !important;
    }

    #main-menu {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: clamp(18px, 3vw, 32px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }
    body.menu-mode.menu-ready #main-menu {
      opacity: 1;
      pointer-events: auto;
    }
    #main-menu::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 168, 76, 0.14), transparent 38%),
        radial-gradient(circle at 76% 14%, rgba(78, 205, 196, 0.12), transparent 36%),
        linear-gradient(180deg, rgba(8, 16, 24, 0.08), rgba(8, 16, 24, 0.24) 62%, rgba(8, 16, 24, 0.42));
    }
    #main-menu::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: 0.12;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
    }
    #menu-content {
      position: relative;
      z-index: 1;
      width: min(1280px, 100%);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: clamp(4px, 1vw, 18px) 0;
    }
    #menu-header {
      max-width: 560px;
      padding-top: clamp(4px, 1vw, 12px);
    }
    #menu-kicker {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(15, 28, 39, 0.18);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c5d6db;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2.2px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }
    #menu-kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ecdc4;
      box-shadow: 0 0 18px rgba(78, 205, 196, 0.9);
    }
    #menu-title {
      margin-top: 18px;
      max-width: 8ch;
      font-family: 'SartoshiScript', monospace;
      font-size: clamp(56px, 11vw, 118px);
      line-height: 0.88;
      color: #fff7e8;
      text-shadow: 0 16px 38px rgba(0,0,0,0.32);
    }
    #menu-copy {
      margin-top: 12px;
      max-width: 20rem;
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      text-shadow: 0 4px 12px rgba(0,0,0,0.34);
    }
    #menu-games-shell {
      align-self: flex-end;
      width: min(460px, 100%);
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(17, 29, 39, 0.36), rgba(12, 20, 28, 0.56));
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.34);
    }
    #menu-games-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(255, 166, 77, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(78, 205, 196, 0.12), transparent 38%);
    }
    #menu-games {
      position: relative;
      z-index: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #menu-games-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255,255,255,0.68);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
    }
    #menu-game-grid {
      display: grid;
      gap: 14px;
    }
    .game-card {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 24px 24px 22px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(135deg, rgba(255, 145, 77, 0.16), rgba(78, 205, 196, 0.14)),
        rgba(20, 32, 41, 0.82);
      color: #fff;
      text-align: left;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.12), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%);
    }
    .game-card:hover,
    .game-card:focus-visible {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 22px 50px rgba(0,0,0,0.28);
      outline: none;
    }
    .game-card:active {
      transform: translateY(0);
      filter: brightness(1.06);
    }
    .game-card-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 1.7px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }
    .game-card-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }
    .game-card-status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffb34d;
      box-shadow: 0 0 16px rgba(255, 179, 77, 0.8);
    }
    .game-card-title {
      position: relative;
      z-index: 1;
      margin-top: 20px;
      display: block;
      font-family: 'SartoshiScript', monospace;
      font-size: clamp(38px, 5vw, 56px);
      line-height: 0.94;
      color: #fff6e7;
    }
    .game-card-subtitle {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      display: block;
      color: #4ecdc4;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .game-card-description {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      display: block;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.55;
      max-width: 30ch;
    }
    .game-card-cta {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 17px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .game-card-cta::after {
      content: '>';
      font-size: 14px;
    }

    /* Top overlay — title, instructions, score */
    #ui {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #instructions { font-size: 14px; opacity: 0.8; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
    #score {
      position: absolute; top: 12px; left: 12px;
      color: #e94560; font-family: 'SartoshiScript', monospace; font-size: 36px; font-weight: bold;
      white-space: nowrap; pointer-events: none; z-index: 10;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, 30%);
      color: #fff; font-size: 20px; font-family: 'SartoshiScript', monospace; z-index: 20;
      text-align: center;
    }

    /* Top-right corner buttons */
    .corner-btn {
      position: absolute; top: 12px; z-index: 11;
      background: rgba(0,0,0,0.5); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
      padding: 6px 10px; font-family: monospace; font-size: 12px; cursor: pointer;
    }
    .corner-btn:active { background: rgba(255,255,255,0.15); }
    .corner-btn.active { background: #e94560; border-color: #e94560; }
    #menu-btn { right: 292px; }
    #follow-toggle { right: 196px; }
    #cam-toggle { right: 100px; }
    #toggle-controls { right: 12px; }

    /* Settings panel */
    #controls {
      position: absolute; top: 44px; right: 12px;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
      padding: 12px 14px; border-radius: 8px;
      color: #fff; font-size: 12px; z-index: 12;
      min-width: 200px; max-height: 70vh; overflow-y: auto;
      display: none;
    }
    #controls h3 { margin: 0 0 8px; font-size: 12px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
    #controls label { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; gap: 8px; }
    #controls label span { opacity: 0.8; white-space: nowrap; }
    #controls input[type=range] { flex: 1; min-width: 70px; cursor: pointer; accent-color: #e94560; }
    #controls .val { min-width: 28px; text-align: right; font-size: 11px; opacity: 0.5; }
    #defaults-btn {
      margin-top: 8px; width: 100%; padding: 5px;
      font-family: monospace; font-size: 11px;
      background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; cursor: pointer;
    }

    /* Camera hint tooltip */
    #cam-hint {
      display: none; position: absolute; top: 44px; right: 12px;
      background: rgba(0,0,0,0.85); color: #4ecdc4;
      padding: 8px 14px; border-radius: 6px;
      font-family: monospace; font-size: 11px; z-index: 13;
      pointer-events: none; line-height: 1.6;
    }

    /* Bottom HUD bar */
    #hud {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      z-index: 10; padding: 8px 12px 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    #level-select {
      display: flex; gap: 3px; margin-bottom: 8px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .level-btn {
      background: rgba(255,255,255,0.08); color: #fff;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 5px;
      padding: 6px 12px; font-family: monospace; font-size: 12px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .level-btn.active { background: #e94560; border-color: #e94560; }
    .level-btn:active:not(.active) { background: rgba(255,255,255,0.15); }

    #action-row {
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .action-btn {
      padding: 10px 24px; font-family: monospace; font-size: 15px; font-weight: bold;
      color: #fff; border: none; border-radius: 6px; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .action-btn:active { filter: brightness(1.2); }
    #go-btn { background: #4ecdc4; display: none; font-family: 'SartoshiScript', monospace; font-size: 22px; }
    #reset-btn { background: #e94560; display: none; }
    #clear-btn { background: rgba(255,255,255,0.15); display: none; font-size: 13px; padding: 8px 16px; }

    /* Impact captures — above HUD */
    #impact-captures {
      display: none; position: absolute; bottom: 110px; left: 12px; z-index: 15;
    }
    #impact-captures > div { display: flex; gap: 6px; }
    .capture-btn {
      padding: 10px 16px; border-radius: 6px; cursor: pointer;
      font-family: monospace; font-size: 12px; font-weight: bold; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #impact-photo .capture-btn { background: #fff; color: #1a1a2e; }
    #impact-video-wrap .capture-btn { background: #4ecdc4; color: #1a1a2e; }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #main-menu { padding: 16px; }
      #menu-content { gap: 26px; }
      #menu-header { max-width: 360px; }
      #menu-title { max-width: none; }
      #menu-games-shell { width: 100%; }
      #menu-games { padding: 18px; }
      #instructions { font-size: 12px; }
      .corner-btn { padding: 8px 10px; font-size: 11px; }
      #menu-btn { right: 254px; }
      #follow-toggle { right: 168px; }
      #cam-toggle { right: 82px; }
      #toggle-controls { right: 8px; }
      #controls { top: 40px; right: 8px; }
      #hud { padding: 6px 8px 8px; }
      .level-btn { padding: 7px 10px; font-size: 11px; }
      .action-btn { padding: 10px 18px; font-size: 14px; }
      #clear-btn { padding: 8px 12px; font-size: 12px; }
      #impact-captures { bottom: 100px; left: 8px; }
    }
    @media (max-width: 400px) {
      #menu-copy { max-width: 16rem; }
      #menu-games { padding: 16px; }
      .game-card { padding: 18px 18px 16px; }
      .action-btn { padding: 8px 14px; font-size: 13px; }
      .level-btn { padding: 6px 8px; font-size: 10px; }
    }
  </style>
</head>
<body class="menu-mode">
  <div id="main-menu" aria-label="Game selection">
    <div id="menu-content">
      <header id="menu-header">
        <div id="menu-kicker">mfer arcade</div>
        <div id="menu-title">choose a game</div>
        <div id="menu-copy">One cabinet live. More on deck.</div>
      </header>
      <section id="menu-games-shell">
        <div id="menu-games">
          <div id="menu-games-head">
            <span>games</span>
            <span>local build</span>
          </div>
          <div id="menu-game-grid"></div>
        </div>
      </section>
    </div>
  </div>

  <div id="score"></div>
  <div id="ui">
    <div id="instructions">click to place, shift+drag to set height</div>
  </div>

  <div id="loading">loading mfer...</div>

  <!-- Top-right corner -->
  <button id="menu-btn" class="corner-btn">menu</button>
  <button id="follow-toggle" class="corner-btn active">follow: on</button>
  <button id="cam-toggle" class="corner-btn">cam: near</button>
  <button id="toggle-controls" class="corner-btn">settings</button>
  <div id="cam-hint">WASD/arrows move, Q/E rotate, Z/X up/down<br>right-click drag to orbit, scroll to zoom</div>

  <!-- Settings panel -->
  <div id="controls">
    <h3>physics</h3>
    <label><span>gravity</span><input type="range" id="sl-gravity" min="1" max="50" value="15" step="1"><span class="val" id="v-gravity">15</span></label>
    <label><span>launch</span><input type="range" id="sl-launch" min="0" max="10" value="2" step="0.5"><span class="val" id="v-launch">2</span></label>
    <label><span>spin</span><input type="range" id="sl-spin" min="0" max="15" value="6" step="0.5"><span class="val" id="v-spin">6</span></label>
    <label><span>bounce</span><input type="range" id="sl-bounce" min="0" max="1" value="0.3" step="0.05"><span class="val" id="v-bounce">0.3</span></label>
    <label><span>damping</span><input type="range" id="sl-damping" min="0" max="4" value="2" step="0.1"><span class="val" id="v-damping">2</span></label>
    <label><span>height</span><input type="range" id="sl-height" min="3" max="20" value="7" step="1"><span class="val" id="v-height">7</span></label>
    <label><span>speed</span><input type="range" id="sl-timescale" min="10" max="200" value="100" step="10"><span class="val" id="v-timescale">100%</span></label>
    <label data-level="1"><span>stairs</span><input type="range" id="sl-stairs" min="10" max="50" value="30" step="1"><span class="val" id="v-stairs">30</span></label>
    <label data-level="3"><span>pachinko</span><input type="range" id="sl-pachinko" min="1" max="10" value="5" step="1"><span class="val" id="v-pachinko">5</span></label>
    <button id="defaults-btn">defaults</button>
    <h3 style="margin-top:10px;">mfer</h3>
    <div style="display:flex;gap:4px;align-items:center;">
      <button id="mfer-mode-btn" style="flex-shrink:0;padding:4px 8px;font-family:monospace;font-size:11px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:4px;cursor:pointer;">random</button>
      <input id="mfer-id-input" type="number" min="0" max="10020" placeholder="mfer #" style="display:none;width:70px;padding:4px;font-family:monospace;font-size:11px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:4px;">
    </div>
  </div>

  <!-- Impact captures -->
  <div id="impact-captures">
    <div>
      <div id="impact-photo" style="cursor:pointer;"><div class="capture-btn">save photo</div></div>
      <div id="impact-video-wrap" style="cursor:pointer;display:none;"><div class="capture-btn">save gif</div></div>
      <div id="impact-full-video" style="cursor:pointer;display:none;"><div class="capture-btn" style="background:#ff8844;">save video</div></div>
    </div>
  </div>

  <!-- Save/Share modal -->
  <div id="save-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;">
    <div id="save-modal-content" style="background:rgba(20,20,25,0.95);border-radius:16px;padding:24px;max-width:400px;width:90%;border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.5);text-align:center;max-height:90vh;overflow-y:auto;">
      <div style="color:#fff;font-family:'SartoshiScript',monospace;font-size:20px;margin-bottom:12px;" id="save-modal-title">your mfer</div>
      <div id="save-modal-hint" style="background:rgba(255,255,255,0.1);padding:10px;border-radius:8px;margin-bottom:14px;color:#aaa;font-family:monospace;font-size:12px;"></div>
      <div id="save-modal-media" style="display:flex;justify-content:center;margin-bottom:14px;"></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button id="save-modal-download" class="action-btn" style="background:#4ecdc4;font-size:13px;padding:8px 18px;">download</button>
        <button id="save-modal-share" class="action-btn" style="background:#6b8cff;font-size:13px;padding:8px 18px;display:none;">share</button>
        <button id="save-modal-close" class="action-btn" style="background:rgba(255,255,255,0.15);font-size:13px;padding:8px 18px;">close</button>
      </div>
    </div>
  </div>

  <!-- Bottom HUD -->
  <div id="hud">
    <div id="level-select">
      <button class="level-btn active" data-level="0">truck hit</button>
      <button class="level-btn" data-level="1">stairs</button>
      <button class="level-btn" data-level="2">wrecking ball</button>
      <button class="level-btn" data-level="3">pachinko</button>
      <button class="level-btn" data-level="4">press</button>
      <button class="level-btn" data-level="5">cannon</button>
      <button class="level-btn" data-level="6">cannonball</button>
      <button class="level-btn" data-level="7">firing range</button>
      <button class="level-btn" data-level="8">pool</button>
      <button class="level-btn" data-level="9">golf</button>
      <button class="level-btn" data-level="10">laundromat</button>
    </div>
    <div id="action-row">
      <button id="go-btn" class="action-btn">go!</button>
      <button id="reset-btn" class="action-btn">reset</button>
      <button id="clear-btn" class="action-btn">clear</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
